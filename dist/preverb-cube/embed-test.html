<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>acha-mimo — embed / iframe test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: system-ui, sans-serif;
      padding: 1rem;
      background: #e9ecef;
    }

    h1 {
      font-size: 1.15rem;
      margin: 0 0 0.5rem;
    }

    p {
      font-size: 0.88rem;
      color: #495057;
      margin: 0 0 1rem;
      max-width: 52rem;
      line-height: 1.5;
    }

    code {
      font-size: 0.9em;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
    }

    .host {
      background: #fff;
      border: 1px solid #ced4da;
      border-radius: 8px;
      overflow: hidden;
    }

    .host h2 {
      margin: 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
    }

    .host iframe {
      display: block;
      width: 100%;
      border: 0;
    }

    .short {
      width: 100%;
      max-width: 420px;
    }

    .short iframe {
      height: 220px;
    }

    .tall {
      width: 100%;
      max-width: 480px;
    }

    .tall iframe {
      height: 560px;
    }

    .pct {
      flex: 1;
      min-width: 280px;
    }

    .pct .frame {
      height: 40vh;
      min-height: 200px;
    }

    .pct iframe {
      height: 100%;
      min-height: 200px;
    }
  </style>
</head>

<body>
  <h1>Iframe embed preview</h1>
  <div class="row">
    <div class="host short">
      <h2>Short iframe (220px)</h2>
      <iframe title="acha-mimo — short embed" src="./?embedded=1"></iframe>
    </div>
    <div class="host tall">
      <h2>Tall iframe (560px)</h2>
      <iframe title="acha-mimo — tall embed" src="./?embedded=1"></iframe>
    </div>
    <div class="host pct">
      <h2>Responsive (40vh, min 200px)</h2>
      <div class="frame">
        <iframe title="acha-mimo — percentage height" src="./?embedded=1"></iframe>
      </div>
    </div>
  </div>
</body>

</html>
